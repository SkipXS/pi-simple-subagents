name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.19.0']
        pi-version: ['0.78.0', '>=0.78.0 <1']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Install tested Pi host API range entry
        run: npm install --no-save --save-dev @earendil-works/pi-ai@"${{ matrix.pi-version }}" @earendil-works/pi-coding-agent@"${{ matrix.pi-version }}"
      - run: npm run check
      - run: npm pack --dry-run --ignore-scripts
      - name: Smoke-test packed Pi package load
        shell: bash
        run: |
          set -euo pipefail
          tarball="$(npm pack --ignore-scripts --silent)"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp" "$tarball"' EXIT
          npm install --prefix "$tmp/install" "$PWD/$tarball" --ignore-scripts --legacy-peer-deps
          pkg_dir="$tmp/install/node_modules/pi-simple-subagents"
          ./node_modules/.bin/pi -e "$pkg_dir" --list-models "pi-simple-subagents-smoke-no-model"
